name: "Drift Detection — Terraform Validate (IAC-005)"

# Daily validation of the infrastructure configuration.
# Detects drift from provider schema changes, module interface changes, or broken references.
# For real drift detection (plan against live state), run terraform plan manually with backend.hcl.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: read-all

jobs:
  validate:
    name: "IAC-005 — Drift detection (validate all components)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Validate all component directories
        run: |
          set -e
          failed=0
          for dir in . networking storage secrets discovery; do
            [ -f "$dir/versions.tf" ] || continue
            echo "→ $dir"
            terraform -chdir="$dir" init -backend=false -no-color 2>&1 | tail -1
            terraform -chdir="$dir" validate -no-color || { echo "FAIL: $dir"; failed=1; }
          done
          exit $failed
